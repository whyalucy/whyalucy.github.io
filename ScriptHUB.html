<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RXSCRIPTS · Script Hub</title>
    <link rel="stylesheet" href="hub.css">
</head>
<body>
    <canvas id="spiderWebCanvas"></canvas>
    
    <div class="background">
        <img src="backgroundimg.jpg" alt="RXScripts hub background">
        <div class="background-overlay"></div>
    </div>
    <main class="content">
        <h1>📁 RXSCRIPTS · HUB</h1>
        <h2>Click on script to copy</h2>

        <div class="script-grid">
            <div class="script-card" data-script="ContainerRNG" data-broken="false">
                <span class="script-name">CONTAINER RNG</span>
                <button class="copy-btn" data-script="ContainerRNG">📋 copy</button>
            </div>
            
            <div class="script-card" data-script="AnimeAbilitiesTower" data-broken="false">
                <span class="script-name">Anime Abilities Tower</span>
                <button class="copy-btn" data-script="AnimeAbilitiesTower">📋 copy</button>
            </div>

            <div class="script-card" data-script="LoopTP" data-broken="false">
                <span class="script-name">Loop TP</span>
                <button class="copy-btn" data-script="LoopTP">📋 copy</button>
            </div>

            <div class="script-card" data-script="GoKartRaceClicker" data-broken="false">
                <span class="script-name">Go-Kart Race Clicker</span>
                <button class="copy-btn" data-script="GoKartRaceClicker">📋 copy</button>
            </div>
            
        </div>

        <div class="back-link">
            <a href="https://whyalucy.github.io/RXSCRIPTS.html">◀ back to main page</a>
        </div>
    </main>

    <script>
        (function() {
            const scripts = {
                ContainerRNG:        'loadstring(game:HttpGet("https://raw.githubusercontent.com/whyalucy/rbxscripts/refs/heads/main/Container%20RNG%20OPEN%20SOURCE.lua"))()',
                AnimeAbilitiesTower: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/whyalucy/rbxscripts/refs/heads/main/ANIME%20ABILITIES%20TOWER%20obf.lua"))()',
                LoopTP: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/whyalucy/rbxscripts/refs/heads/main/looptpcordsobf.lua"))()',
                GoKartRaceClicker: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/whyalucy/rbxscripts/refs/heads/main/Go-Kart%20Race%20Clickerobf.lua"))()'
            };

            function copyToClipboard(text) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast("✅ Script copied to clipboard!");
                }).catch(() => {
                    showToast("❌ Failed to copy. Select manually.", true);
                });
            }

            function showToast(msg, isError = false) {
                let toast = document.createElement('div');
                toast.className = 'toast-message';
                toast.textContent = msg;
                if (isError) toast.style.background = '#b33';
                toast.style.position = 'fixed';
                toast.style.bottom = '20px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.background = isError ? '#b33' : '#2a6f4f';
                toast.style.color = '#fff';
                toast.style.padding = '10px 20px';
                toast.style.borderRadius = '40px';
                toast.style.fontSize = '0.9rem';
                toast.style.fontWeight = 'bold';
                toast.style.zIndex = '9999';
                toast.style.boxShadow = '0 0 10px rgba(0,0,0,0.3)';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2500);
            }

            document.querySelectorAll('.script-card').forEach(card => {
                const isBroken = card.getAttribute('data-broken') === 'true';
                if (isBroken) {
                    card.classList.add('broken');
                    const btn = card.querySelector('.copy-btn');
                    if (btn) btn.style.display = 'none';
                }
            });

            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const scriptKey = btn.getAttribute('data-script');
                    const scriptCode = scripts[scriptKey];
                    if (scriptCode) {
                        copyToClipboard(scriptCode);
                    } else {
                        showToast("❌ Script code not set yet (edit hub.html)", true);
                    }
                });
            });
        })();

        (function() {
            const canvas = document.getElementById('spiderWebCanvas');
            const ctx = canvas.getContext('2d');
            
            let mouseX = 0, mouseY = 0;
            let points = [];
            let animationId = null;
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            function initPoints() {
                points = [];
                for(let i = 0; i < 60; i++) {
                    points.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: (Math.random() - 0.5) * 0.3
                    });
                }
            }
            
            function updatePoints() {
                for(let i = 0; i < points.length; i++) {
                    let p = points[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    
                    if(p.x < 0) { p.x = 0; p.vx *= -0.8; }
                    if(p.x > canvas.width) { p.x = canvas.width; p.vx *= -0.8; }
                    if(p.y < 0) { p.y = 0; p.vy *= -0.8; }
                    if(p.y > canvas.height) { p.y = canvas.height; p.vy *= -0.8; }
                }
            }
            
            function drawWeb() {
                if(!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const maxDist = 250;
                for(let i = 0; i < points.length; i++) {
                    for(let j = i + 1; j < points.length; j++) {
                        const dx = points[i].x - points[j].x;
                        const dy = points[i].y - points[j].y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if(dist < maxDist) {
                            const opacity = (1 - dist / maxDist) * 0.3;
                            ctx.beginPath();
                            ctx.moveTo(points[i].x, points[i].y);
                            ctx.lineTo(points[j].x, points[j].y);
                            ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                }
                
                for(let i = 0; i < points.length; i++) {
                    const dx = points[i].x - mouseX;
                    const dy = points[i].y - mouseY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if(dist < 200) {
                        const opacity = (1 - dist / 200) * 0.4;
                        ctx.beginPath();
                        ctx.moveTo(mouseX, mouseY);
                        ctx.lineTo(points[i].x, points[i].y);
                        ctx.strokeStyle = `rgba(220, 220, 255, ${opacity})`;
                        ctx.lineWidth = 0.6;
                        ctx.stroke();
                    }
                }
                
                for(let i = 0; i < points.length; i++) {
                    ctx.beginPath();
                    ctx.arc(points[i].x, points[i].y, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, 0.5)`;
                    ctx.fill();
                }
                
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, 0.3)`;
                ctx.fill();
            }
            
            function animate() {
                if(!canvas.isConnected) return;
                updatePoints();
                drawWeb();
                animationId = requestAnimationFrame(animate);
            }
            
            function onMouseMove(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
            
            function init() {
                resizeCanvas();
                initPoints();
                window.addEventListener('resize', () => {
                    resizeCanvas();
                    initPoints();
                });
                window.addEventListener('mousemove', onMouseMove);
                animate();
            }
            
            init();
        })();
    </script>
</body>
</html>
