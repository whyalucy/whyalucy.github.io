<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RXSCRIPTS</title>
    <link rel="stylesheet" href="RXSCRIPT.css">
</head>
<body>
    <canvas id="spiderWebCanvas"></canvas>
    
    <div class="background">
        <img src="backgroundimg.jpg" alt="RXScripts background">
        <div class="background-overlay"></div>
    </div>
    <main class="content">
        <h1>WELCOME TO RXSCRIPTS</h1>
        <h2>I would be very grateful if you subscribe to my YouTube and telegram channel.</h2>
        <h3><a href="https://www.youtube.com/@onexale">RXScripts YouTube</a></h3>
        <h3><a href="https://t.me/robloxrxscripts">RXScripts Telegram</a></h3>
        <h3><a href="http://discordapp.com/users/715915325421518958">RXScripts Discord</a></h3>
        <h3><a href="https://whyalucy.github.io/ScriptHUB.html">Script HUB</a></h3>
    </main>

    <script>
        // ============================================
        // ПАУТИНКА ПРИ ДВИЖЕНИИ МЫШИ
        // ============================================
        (function() {
            const canvas = document.getElementById('spiderWebCanvas');
            const ctx = canvas.getContext('2d');
            
            let mouseX = 0, mouseY = 0;
            let points = [];
            let animationId = null;
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            function initPoints() {
                points = [];
                // Создаём случайные точки по всему экрану (60 точек для густой сети)
                for(let i = 0; i < 60; i++) {
                    points.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: (Math.random() - 0.5) * 0.3
                    });
                }
            }
            
            function updatePoints() {
                for(let i = 0; i < points.length; i++) {
                    let p = points[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    
                    // Отталкивание от границ
                    if(p.x < 0) { p.x = 0; p.vx *= -0.8; }
                    if(p.x > canvas.width) { p.x = canvas.width; p.vx *= -0.8; }
                    if(p.y < 0) { p.y = 0; p.vy *= -0.8; }
                    if(p.y > canvas.height) { p.y = canvas.height; p.vy *= -0.8; }
                }
            }
            
            function drawWeb() {
                if(!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Рисуем линии между точками (если расстояние меньше порога)
                const maxDist = 220;
                for(let i = 0; i < points.length; i++) {
                    for(let j = i + 1; j < points.length; j++) {
                        const dx = points[i].x - points[j].x;
                        const dy = points[i].y - points[j].y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if(dist < maxDist) {
                            const opacity = (1 - dist / maxDist) * 0.35;
                            ctx.beginPath();
                            ctx.moveTo(points[i].x, points[i].y);
                            ctx.lineTo(points[j].x, points[j].y);
                            ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                }
                
                // Рисуем линии от мыши к ближайшим точкам
                for(let i = 0; i < points.length; i++) {
                    const dx = points[i].x - mouseX;
                    const dy = points[i].y - mouseY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if(dist < 250) {
                        const opacity = (1 - dist / 250) * 0.45;
                        ctx.beginPath();
                        ctx.moveTo(mouseX, mouseY);
                        ctx.lineTo(points[i].x, points[i].y);
                        ctx.strokeStyle = `rgba(220, 220, 255, ${opacity})`;
                        ctx.lineWidth = 0.7;
                        ctx.stroke();
                    }
                }
                
                // Рисуем точки
                for(let i = 0; i < points.length; i++) {
                    ctx.beginPath();
                    ctx.arc(points[i].x, points[i].y, 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, 0.5)`;
                    ctx.fill();
                }
                
                // Маленький кружок под мышью
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, 0.25)`;
                ctx.fill();
            }
            
            function animate() {
                if(!canvas.isConnected) return;
                updatePoints();
                drawWeb();
                animationId = requestAnimationFrame(animate);
            }
            
            function onMouseMove(e) {
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
            
            function init() {
                resizeCanvas();
                initPoints();
                window.addEventListener('resize', () => {
                    resizeCanvas();
                    initPoints();
                });
                window.addEventListener('mousemove', onMouseMove);
                animate();
            }
            
            init();
        })();
    </script>
</body>
</html>
