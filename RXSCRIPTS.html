<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RXSCRIPTS</title>
    <link rel="stylesheet" href="RXSCRIPT.css">
</head>
<body>
    <canvas id="spiderWebCanvas"></canvas>
    
    <div class="background">
        <img src="backgroundimg.jpg" alt="RXScripts background">
        <div class="background-overlay"></div>
    </div>
    <main class="content">
        <h1>WELCOME TO RXSCRIPTS</h1>
        <h2>I would be very grateful if you subscribe to my YouTube and telegram channel.</h2>
        <div class="buttons-grid">
            <a href="https://www.youtube.com/@onexale" class="social-btn youtube">▶ YouTube</a>
            <a href="https://t.me/robloxrxscripts" class="social-btn telegram">📱 Telegram</a>
            <a href="http://discordapp.com/users/715915325421518958" class="social-btn discord">🎮 Discord</a>
            <a href="https://whyalucy.github.io/ScriptHUB.html" class="social-btn hub">📁 Script HUB</a>
            <a href="https://whyalucy.github.io/game.html" class="social-btn game">🕷️ Game</a>
        </div>
    </main>

    <script>
        // ============================================
        // ПАУТИНКА (оптимизирована для мобилок)
        // ============================================
        (function() {
            const canvas = document.getElementById('spiderWebCanvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            let mouseX = 0, mouseY = 0;
            let points = [];
            let animationId = null;
            let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            function initPoints() {
                points = [];
                // На телефонах меньше точек для производительности
                const pointCount = isMobile ? 25 : 60;
                
                for(let i = 0; i < pointCount; i++) {
                    points.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: (Math.random() - 0.5) * 0.3
                    });
                }
            }
            
            function updatePoints() {
                for(let i = 0; i < points.length; i++) {
                    let p = points[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    
                    if(p.x < 0) { p.x = 0; p.vx *= -0.8; }
                    if(p.x > canvas.width) { p.x = canvas.width; p.vx *= -0.8; }
                    if(p.y < 0) { p.y = 0; p.vy *= -0.8; }
                    if(p.y > canvas.height) { p.y = canvas.height; p.vy *= -0.8; }
                }
            }
            
            function drawWeb() {
                if(!ctx) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // На телефонах меньше дальность соединения
                const maxDist = isMobile ? 150 : 250;
                
                for(let i = 0; i < points.length; i++) {
                    for(let j = i + 1; j < points.length; j++) {
                        const dx = points[i].x - points[j].x;
                        const dy = points[i].y - points[j].y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if(dist < maxDist) {
                            const opacity = (1 - dist / maxDist) * 0.35;
                            ctx.beginPath();
                            ctx.moveTo(points[i].x, points[i].y);
                            ctx.lineTo(points[j].x, points[j].y);
                            ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                            ctx.lineWidth = isMobile ? 0.5 : 0.8;
                            ctx.stroke();
                        }
                    }
                }
                
                // Линии от мыши (только на десктопе, на мобилках нет мыши)
                if(!isMobile && mouseX > 0 && mouseY > 0) {
                    for(let i = 0; i < points.length; i++) {
                        const dx = points[i].x - mouseX;
                        const dy = points[i].y - mouseY;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if(dist < 200) {
                            const opacity = (1 - dist / 300) * 0.45;
                            ctx.beginPath();
                            ctx.moveTo(mouseX, mouseY);
                            ctx.lineTo(points[i].x, points[i].y);
                            ctx.strokeStyle = `rgba(220, 220, 255, ${opacity})`;
                            ctx.lineWidth = isMobile ? 0.5 : 0.7;
                            ctx.stroke();
                        }
                    }
                }
                
                // Рисуем точки (на телефонах меньше и прозрачнее)
                const pointSize = isMobile ? 1 : 1.5;
                const pointOpacity = isMobile ? 0.4 : 0.5;
                for(let i = 0; i < points.length; i++) {
                    ctx.beginPath();
                    ctx.arc(points[i].x, points[i].y, pointSize, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${pointOpacity})`;
                    ctx.fill();
                }
            }
            
            function animate() {
                if(!canvas.isConnected) return;
                updatePoints();
                drawWeb();
                animationId = requestAnimationFrame(animate);
            }
            
            function onMouseMove(e) {
                if(isMobile) return;
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
            
            function init() {
                resizeCanvas();
                initPoints();
                window.addEventListener('resize', () => {
                    resizeCanvas();
                    initPoints();
                });
                if(!isMobile) {
                    window.addEventListener('mousemove', onMouseMove);
                }
                animate();
            }
            
            init();
        })();
    </script>
</body>
</html>
